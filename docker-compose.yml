version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vistaflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: vistaflow
    volumes:
      - mongodb_data:/data/db
    networks:
      - vistaflow-network

  # Optional: MongoDB Express (Web UI for MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: vistaflow-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - vistaflow-network

volumes:
  mongodb_data:
    driver: local

networks:
  vistaflow-network:
    driver: bridge
